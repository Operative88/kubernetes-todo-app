<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>K8s To-Do App (Python+PG)</title>
</head> 
<body>
    <h1>Moje zadania</h1>
    <ul id="todo-list"></ul>

    <input type="text" id="task-input" placeholder="Nowe zadanie...">
    <button onclick="addTask()">Dodaj</button>

    <script>
    async function fetchTasks() {
        try {
            // Dodajemy parametr ?t=, aby oszukać cache przeglądarki
            const response = await fetch('/api/todos' + Date.now());
            const tasks = await response.json();
            
            const list = document.getElementById('todo-list');
            
            // KLUCZOWY MOMENT: Czyścimy listę przed renderowaniem nowej
            list.innerHTML = ''; 

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.innerText = task;
                list.appendChild(li);
            });
        } catch (err) {
            console.error("Błąd pobierania:", err);
        }
    }

    async function addTask() {
        const input = document.getElementById('task-input');
        const task = input.value;
        if (!task) return;

        try {
            const response = await fetch('/api/todos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task })
            });

            if (response.ok) {
                input.value = '';
                // Czekamy chwilę, żeby baza zdążyła przetworzyć, i odświeżamy
                setTimeout(fetchTasks, 100); 
            }
        } catch (err) {
            console.error("Błąd dodawania:", err);
        }
    }

    fetchTasks();
</script>
</body>
</html>
