version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: tododb
    ports:
      - "5432:5432"
    volumes:
      # Montujemy plik SQL, aby wykonał się przy pierwszym starcie
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=mysecretpassword
      - DB_NAME=tododb
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "8080:80"